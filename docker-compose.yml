services:
  postgres:
    image: postgres:16
    container_name: unitiva_academic_scheduler_db
    restart: always

    environment:
      POSTGRES_DB: unitiva_academic_scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: